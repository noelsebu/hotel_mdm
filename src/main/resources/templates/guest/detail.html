<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout/main}">
<head><title th:text="${guest.fullName}">Guest Detail</title></head>
<body>
<div layout:fragment="content">

    <div class="page-header d-flex justify-content-between align-items-start mb-4">
        <div class="d-flex align-items-center gap-3">
            <a th:href="@{/guest}" class="btn btn-sm btn-outline-secondary"><i class="bi bi-arrow-left"></i></a>
            <div>
                <h2 class="mb-0" th:text="${guest.fullName}"></h2>
                <div class="d-flex align-items-center gap-2 mt-1">
                    <span th:insert="~{fragments/workflow-badge :: badge(${guest.workflowStatus})}"></span>
                    <span class="badge"
                          th:classappend="${guest.loyaltyTier.name() == 'PLATINUM'} ? 'loyalty-platinum' :
                                         (${guest.loyaltyTier.name() == 'GOLD'} ? 'loyalty-gold' :
                                         (${guest.loyaltyTier.name() == 'SILVER'} ? 'loyalty-silver' : 'loyalty-bronze'))"
                          th:text="${guest.loyaltyTier.label + ' · ' + #numbers.formatInteger(guest.loyaltyPoints,1,'COMMA') + ' pts'}"></span>
                </div>
            </div>
        </div>
        <div class="d-flex gap-2" sec:authorize="hasAnyRole('ADMIN','DATA_MANAGER','DATA_STEWARD')">
            <a th:href="@{/guest/{id}/edit(id=${guest.id})}" class="btn btn-outline-primary btn-sm" th:if="${guest.editable}">
                <i class="bi bi-pencil me-1"></i>Edit
            </a>
            <form th:if="${guest.draft or guest.rejected}"
                  th:action="@{/guest/{id}/submit(id=${guest.id})}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-warning btn-sm">
                    <i class="bi bi-send me-1"></i>Submit for Approval
                </button>
            </form>
            <form th:action="@{/guest/{id}/delete(id=${guest.id})}" method="post"
                  sec:authorize="hasAnyRole('ADMIN','DATA_MANAGER')"
                  onsubmit="return confirm('Delete this guest profile?')">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button class="btn btn-outline-danger btn-sm"><i class="bi bi-trash"></i></button>
            </form>
        </div>
    </div>

    <div th:if="${guest.rejected and guest.rejectionReason != null}" class="alert alert-danger">
        <strong><i class="bi bi-x-circle me-2"></i>Rejected:</strong> <span th:text="${guest.rejectionReason}"></span>
    </div>

    <div th:if="${not #lists.isEmpty(qualityIssues)}" class="alert alert-warning">
        <strong><i class="bi bi-shield-exclamation me-2"></i>Data Quality Issues:</strong>
        <ul class="mb-0 mt-1">
            <li th:each="issue : ${qualityIssues}" th:text="${'[' + issue.severity.label + '] ' + issue.fieldName + ': ' + issue.message}"></li>
        </ul>
    </div>

    <div class="row g-4">
        <!-- Profile Info -->
        <div class="col-lg-4">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white fw-semibold"><i class="bi bi-person me-2"></i>Profile</div>
                <div class="card-body">
                    <dl class="row mb-0">
                        <dt class="col-5">Email</dt><dd class="col-7" th:text="${guest.email}"></dd>
                        <dt class="col-5">Phone</dt><dd class="col-7" th:text="${guest.phone ?: '—'}"></dd>
                        <dt class="col-5">Nationality</dt><dd class="col-7" th:text="${guest.nationality ?: '—'}"></dd>
                        <dt class="col-5">Date of Birth</dt>
                        <dd class="col-7" th:text="${guest.dateOfBirth != null} ? ${#temporals.format(guest.dateOfBirth,'dd MMM yyyy')} : '—'"></dd>
                        <dt class="col-5">Passport</dt><dd class="col-7" th:text="${guest.passportNumber ?: '—'}"></dd>
                        <dt class="col-5">Notes</dt><dd class="col-7 text-muted small" th:text="${guest.notes ?: '—'}"></dd>
                    </dl>
                </div>
            </div>

            <!-- Add Loyalty Points -->
            <div class="card border-0 shadow-sm mt-3" sec:authorize="hasAnyRole('ADMIN','DATA_MANAGER')">
                <div class="card-header bg-white fw-semibold"><i class="bi bi-trophy me-2"></i>Add Loyalty Points</div>
                <div class="card-body">
                    <form th:action="@{/guest/{id}/points(id=${guest.id})}" method="post" class="d-flex gap-2">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <input type="number" name="points" class="form-control form-control-sm" min="1" placeholder="Points"/>
                        <button type="submit" class="btn btn-sm btn-success">Add</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-lg-8">
            <!-- Preferences -->
            <div class="card border-0 shadow-sm mb-3">
                <div class="card-header bg-white fw-semibold">
                    <i class="bi bi-heart me-2"></i>Preferences
                </div>
                <div class="card-body">
                    <div th:if="${#lists.isEmpty(guest.preferences)}" class="text-muted">No preferences recorded.</div>
                    <div class="d-flex flex-wrap gap-2 mb-3" th:unless="${#lists.isEmpty(guest.preferences)}">
                        <div class="d-flex align-items-center gap-1 preference-tag"
                             th:each="pref : ${guest.preferences}">
                            <span class="text-muted small" th:text="${pref.category.label + ':'}"></span>
                            <strong th:text="${pref.value}"></strong>
                            <form th:action="@{/guest/{id}/preferences/{pid}/remove(id=${guest.id},pid=${pref.id})}"
                                  method="post" class="d-inline"
                                  sec:authorize="hasAnyRole('ADMIN','DATA_MANAGER','DATA_STEWARD')">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button class="btn btn-xs btn-link text-danger p-0 ms-1">&times;</button>
                            </form>
                        </div>
                    </div>
                    <!-- Add Preference -->
                    <form th:action="@{/guest/{id}/preferences/add(id=${guest.id})}" method="post"
                          class="row g-2" sec:authorize="hasAnyRole('ADMIN','DATA_MANAGER','DATA_STEWARD')">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <div class="col-md-4">
                            <select name="category" class="form-select form-select-sm" required>
                                <option value="">Category</option>
                                <option th:each="cat : ${preferenceCategories}" th:value="${cat.name()}" th:text="${cat.label}"></option>
                            </select>
                        </div>
                        <div class="col-md-5">
                            <input type="text" name="value" class="form-control form-control-sm" placeholder="Value" required/>
                        </div>
                        <div class="col-md-3">
                            <button type="submit" class="btn btn-sm btn-outline-primary w-100">
                                <i class="bi bi-plus-lg me-1"></i>Add
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Audit Trail -->
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white fw-semibold"><i class="bi bi-journal-text me-2"></i>Audit History</div>
                <div class="card-body p-0">
                    <div th:if="${#lists.isEmpty(auditHistory)}" class="text-muted text-center py-3">No history.</div>
                    <table class="table table-sm mb-0" th:unless="${#lists.isEmpty(auditHistory)}">
                        <thead class="table-light">
                            <tr><th>Action</th><th>Details</th><th>User</th><th>Date/Time</th></tr>
                        </thead>
                        <tbody>
                            <tr th:each="entry : ${auditHistory}">
                                <td><span class="badge bg-secondary" th:text="${entry.action}"></span></td>
                                <td class="text-muted small" th:text="${entry.details}"></td>
                                <td th:text="${entry.performedBy}"></td>
                                <td class="text-muted small" th:text="${#temporals.format(entry.performedAt,'dd MMM yyyy HH:mm')}"></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
