<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout/main}">
<head><title>Guests</title></head>
<body>
<div layout:fragment="content">
    <div class="page-header d-flex justify-content-between align-items-center mb-4">
        <div class="d-flex align-items-center gap-2">
            <i class="bi bi-people fs-4"></i>
            <h2 class="mb-0">Guest Profiles</h2>
        </div>
        <div class="d-flex gap-2">
            <form method="get" class="d-flex gap-2">
                <input type="search" name="search" class="form-control form-control-sm"
                       placeholder="Search name or email..." th:value="${search}" style="width:220px;"/>
                <button type="submit" class="btn btn-sm btn-outline-secondary"><i class="bi bi-search"></i></button>
            </form>
            <a th:href="@{/guest/new}" class="btn btn-primary"
               sec:authorize="hasAnyRole('ADMIN','DATA_MANAGER','DATA_STEWARD')">
                <i class="bi bi-plus-lg me-1"></i>New Guest
            </a>
        </div>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <div th:if="${#lists.isEmpty(guests)}" class="text-center text-muted py-5">
                <i class="bi bi-people fs-1 d-block mb-3"></i>No guest profiles found.
            </div>
            <table class="table table-hover align-middle mb-0" th:unless="${#lists.isEmpty(guests)}">
                <thead class="table-light">
                    <tr>
                        <th>Guest</th><th>Email</th><th>Nationality</th>
                        <th>Loyalty Tier</th><th>Points</th><th>Status</th><th class="text-end">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="guest : ${guests}">
                        <td>
                            <div class="fw-semibold" th:text="${guest.fullName}"></div>
                            <div class="text-muted small" th:text="${guest.phone ?: ''}"></div>
                        </td>
                        <td th:text="${guest.email}"></td>
                        <td th:text="${guest.nationality ?: '—'}"></td>
                        <td>
                            <span class="badge"
                                  th:classappend="${guest.loyaltyTier.name() == 'PLATINUM'} ? 'loyalty-platinum' :
                                                 (${guest.loyaltyTier.name() == 'GOLD'} ? 'loyalty-gold' :
                                                 (${guest.loyaltyTier.name() == 'SILVER'} ? 'loyalty-silver' : 'loyalty-bronze'))"
                                  th:text="${guest.loyaltyTier.label}"></span>
                        </td>
                        <td th:text="${#numbers.formatInteger(guest.loyaltyPoints,1,'COMMA')}"></td>
                        <td th:insert="~{fragments/workflow-badge :: badge(${guest.workflowStatus})}"></td>
                        <td class="text-end">
                            <a th:href="@{/guest/{id}(id=${guest.id})}" class="btn btn-sm btn-outline-secondary">
                                <i class="bi bi-eye"></i>
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
