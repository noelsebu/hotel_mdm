<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout/main}">
<head><title th:text="${supplier.name}">Supplier Detail</title></head>
<body>
<div layout:fragment="content">

    <div class="page-header d-flex justify-content-between align-items-start mb-4">
        <div class="d-flex align-items-center gap-3">
            <a th:href="@{/vendor}" class="btn btn-sm btn-outline-secondary"><i class="bi bi-arrow-left"></i></a>
            <div>
                <h2 class="mb-0" th:text="${supplier.name}"></h2>
                <div class="d-flex align-items-center gap-2 mt-1">
                    <code th:text="${supplier.code}"></code>
                    <span th:insert="~{fragments/workflow-badge :: badge(${supplier.workflowStatus})}"></span>
                    <span class="badge"
                          th:classappend="${supplier.status.name() == 'ACTIVE'} ? 'bg-success' : (${supplier.status.name() == 'BLACKLISTED'} ? 'bg-danger' : 'bg-secondary')"
                          th:text="${supplier.status.label}"></span>
                </div>
            </div>
        </div>
        <div class="d-flex gap-2" sec:authorize="hasAnyRole('ADMIN','DATA_MANAGER','DATA_STEWARD')">
            <a th:href="@{/vendor/{id}/edit(id=${supplier.id})}" class="btn btn-outline-primary btn-sm" th:if="${supplier.editable}">
                <i class="bi bi-pencil me-1"></i>Edit
            </a>
            <form th:if="${supplier.draft or supplier.rejected}"
                  th:action="@{/vendor/{id}/submit(id=${supplier.id})}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-warning btn-sm"><i class="bi bi-send me-1"></i>Submit for Approval</button>
            </form>
            <form th:action="@{/vendor/{id}/delete(id=${supplier.id})}" method="post"
                  sec:authorize="hasAnyRole('ADMIN','DATA_MANAGER')"
                  onsubmit="return confirm('Delete this supplier?')">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button class="btn btn-outline-danger btn-sm"><i class="bi bi-trash"></i></button>
            </form>
        </div>
    </div>

    <div th:if="${not #lists.isEmpty(qualityIssues)}" class="alert alert-warning mb-4">
        <strong><i class="bi bi-shield-exclamation me-2"></i>Data Quality Issues:</strong>
        <ul class="mb-0 mt-1">
            <li th:each="issue : ${qualityIssues}" th:text="${'[' + issue.severity.label + '] ' + issue.fieldName + ': ' + issue.message}"></li>
        </ul>
    </div>

    <div class="row g-4">
        <!-- Supplier Info -->
        <div class="col-lg-4">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white fw-semibold"><i class="bi bi-info-circle me-2"></i>Details</div>
                <div class="card-body">
                    <dl class="row mb-0">
                        <dt class="col-5">Category</dt><dd class="col-7" th:text="${supplier.category.label}"></dd>
                        <dt class="col-5">Rating</dt>
                        <dd class="col-7">
                            <span th:each="i : ${#numbers.sequence(1,supplier.rating)}" class="text-warning">&#9733;</span>
                            <span th:each="i : ${#numbers.sequence(supplier.rating+1,5)}" class="text-muted">&#9733;</span>
                        </dd>
                        <dt class="col-5">Email</dt><dd class="col-7" th:text="${supplier.email ?: '—'}"></dd>
                        <dt class="col-5">Phone</dt><dd class="col-7" th:text="${supplier.phone ?: '—'}"></dd>
                        <dt class="col-5">Website</dt><dd class="col-7" th:text="${supplier.website ?: '—'}"></dd>
                        <dt class="col-5">Address</dt><dd class="col-7" th:text="${supplier.address ?: '—'}"></dd>
                        <dt class="col-5">City</dt><dd class="col-7" th:text="${supplier.city ?: '—'}"></dd>
                        <dt class="col-5">Country</dt><dd class="col-7" th:text="${supplier.country ?: '—'}"></dd>
                        <dt class="col-5">Notes</dt><dd class="col-7 text-muted small" th:text="${supplier.notes ?: '—'}"></dd>
                    </dl>
                </div>
            </div>
        </div>

        <div class="col-lg-8">
            <!-- Contacts -->
            <div class="card border-0 shadow-sm mb-3">
                <div class="card-header bg-white fw-semibold"><i class="bi bi-person-lines-fill me-2"></i>Contacts</div>
                <div class="card-body">
                    <div th:if="${#lists.isEmpty(contacts)}" class="text-muted mb-3">No contacts added.</div>
                    <div class="row g-2 mb-3" th:unless="${#lists.isEmpty(contacts)}">
                        <div class="col-md-6" th:each="c : ${contacts}">
                            <div class="border rounded p-2 position-relative">
                                <span th:if="${c.primaryContact}" class="badge bg-primary position-absolute top-0 end-0 m-1">Primary</span>
                                <div class="fw-semibold" th:text="${c.name}"></div>
                                <div class="text-muted small" th:text="${c.title ?: ''}"></div>
                                <div class="small" th:text="${c.email ?: ''}"></div>
                                <div class="small" th:text="${c.phone ?: ''}"></div>
                                <form th:action="@{/vendor/{id}/contacts/{cid}/delete(id=${supplier.id},cid=${c.id})}"
                                      method="post" class="d-inline"
                                      sec:authorize="hasAnyRole('ADMIN','DATA_MANAGER')"
                                      onsubmit="return confirm('Remove contact?')">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button class="btn btn-xs btn-outline-danger mt-1"><i class="bi bi-trash"></i> Remove</button>
                                </form>
                            </div>
                        </div>
                    </div>
                    <!-- Add Contact -->
                    <form th:action="@{/vendor/{id}/contacts(id=${supplier.id})}" th:object="${newContact}"
                          method="post" class="row g-2"
                          sec:authorize="hasAnyRole('ADMIN','DATA_MANAGER','DATA_STEWARD')">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <div class="col-md-3"><input type="text" class="form-control form-control-sm" th:field="*{name}" placeholder="Name *" required/></div>
                        <div class="col-md-3"><input type="text" class="form-control form-control-sm" th:field="*{title}" placeholder="Title"/></div>
                        <div class="col-md-3"><input type="email" class="form-control form-control-sm" th:field="*{email}" placeholder="Email"/></div>
                        <div class="col-md-2"><input type="text" class="form-control form-control-sm" th:field="*{phone}" placeholder="Phone"/></div>
                        <div class="col-md-1"><button type="submit" class="btn btn-sm btn-outline-primary w-100"><i class="bi bi-plus-lg"></i></button></div>
                    </form>
                </div>
            </div>

            <!-- Contracts -->
            <div class="card border-0 shadow-sm mb-3">
                <div class="card-header bg-white fw-semibold"><i class="bi bi-file-earmark-text me-2"></i>Contracts</div>
                <div class="card-body p-0">
                    <div th:if="${#lists.isEmpty(contracts)}" class="text-muted text-center py-3">No contracts.</div>
                    <table class="table table-sm mb-0" th:unless="${#lists.isEmpty(contracts)}">
                        <thead class="table-light">
                            <tr><th>Number</th><th>Start</th><th>End</th><th>Value</th><th>Status</th><th></th></tr>
                        </thead>
                        <tbody>
                            <tr th:each="c : ${contracts}" th:classappend="${c.expired} ? 'table-secondary' : ''">
                                <td th:text="${c.contractNumber}"></td>
                                <td th:text="${#temporals.format(c.startDate,'dd MMM yyyy')}"></td>
                                <td th:text="${#temporals.format(c.endDate,'dd MMM yyyy')}"></td>
                                <td th:text="${c.totalValue != null} ? ${'$' + c.totalValue} : '—'"></td>
                                <td><span class="badge"
                                         th:classappend="${c.status.name() == 'ACTIVE'} ? 'bg-success' : (${c.status.name() == 'EXPIRED'} ? 'bg-secondary' : 'bg-warning text-dark')"
                                         th:text="${c.status.label}"></span></td>
                                <td>
                                    <form th:action="@{/vendor/{id}/contracts/{cid}/delete(id=${supplier.id},cid=${c.id})}"
                                          method="post" sec:authorize="hasAnyRole('ADMIN','DATA_MANAGER')"
                                          onsubmit="return confirm('Delete contract?')">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                        <button class="btn btn-xs btn-outline-danger"><i class="bi bi-trash"></i></button>
                                    </form>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <!-- Add Contract -->
                <div class="card-footer bg-white" sec:authorize="hasAnyRole('ADMIN','DATA_MANAGER','DATA_STEWARD')">
                    <form th:action="@{/vendor/{id}/contracts(id=${supplier.id})}" th:object="${newContract}" method="post" class="row g-2">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <div class="col-md-3"><input type="text" class="form-control form-control-sm" th:field="*{contractNumber}" placeholder="Contract # *" required/></div>
                        <div class="col-md-2"><input type="date" class="form-control form-control-sm" th:field="*{startDate}" required/></div>
                        <div class="col-md-2"><input type="date" class="form-control form-control-sm" th:field="*{endDate}" required/></div>
                        <div class="col-md-2"><input type="number" class="form-control form-control-sm" th:field="*{totalValue}" placeholder="Value" step="0.01"/></div>
                        <div class="col-md-2">
                            <select class="form-select form-select-sm" th:field="*{status}">
                                <option th:each="s : ${contractStatuses}" th:value="${s.name()}" th:text="${s.label}"></option>
                            </select>
                        </div>
                        <div class="col-md-1"><button type="submit" class="btn btn-sm btn-outline-primary w-100"><i class="bi bi-plus-lg"></i></button></div>
                    </form>
                </div>
            </div>

            <!-- Audit Trail -->
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white fw-semibold"><i class="bi bi-journal-text me-2"></i>Audit History</div>
                <div class="card-body p-0">
                    <div th:if="${#lists.isEmpty(auditHistory)}" class="text-muted text-center py-3">No history.</div>
                    <table class="table table-sm mb-0" th:unless="${#lists.isEmpty(auditHistory)}">
                        <thead class="table-light"><tr><th>Action</th><th>Details</th><th>User</th><th>Date/Time</th></tr></thead>
                        <tbody>
                            <tr th:each="entry : ${auditHistory}">
                                <td><span class="badge bg-secondary" th:text="${entry.action}"></span></td>
                                <td class="text-muted small" th:text="${entry.details}"></td>
                                <td th:text="${entry.performedBy}"></td>
                                <td class="text-muted small" th:text="${#temporals.format(entry.performedAt,'dd MMM yyyy HH:mm')}"></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
