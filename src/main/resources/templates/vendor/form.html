<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head><title>Supplier Form</title></head>
<body>
<div layout:fragment="content">
    <div class="page-header d-flex align-items-center mb-4">
        <a th:href="@{/vendor}" class="btn btn-sm btn-outline-secondary me-3"><i class="bi bi-arrow-left"></i></a>
        <i class="bi bi-truck me-2 fs-4"></i>
        <h2 class="mb-0" th:text="${supplier.id != null} ? 'Edit Supplier' : 'New Supplier'"></h2>
    </div>

    <div th:if="${qualityErrors}" class="alert alert-danger">
        <strong><i class="bi bi-shield-exclamation me-2"></i>Data Quality Issues:</strong>
        <ul class="mb-0 mt-1">
            <li th:each="err : ${qualityErrors}" th:text="${err.fieldName + ': ' + err.message}"></li>
        </ul>
    </div>

    <div class="card border-0 shadow-sm" style="max-width:800px;">
        <div class="card-body">
            <form th:action="${supplier.id != null} ? @{/vendor/{id}(id=${supplier.id})} : @{/vendor}"
                  th:object="${supplier}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="row g-3">
                    <div class="col-md-8">
                        <label class="form-label fw-semibold">Supplier Name *</label>
                        <input type="text" class="form-control" th:field="*{name}"
                               th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'"/>
                        <div class="invalid-feedback" th:errors="*{name}"></div>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-semibold">Supplier Code *</label>
                        <input type="text" class="form-control text-uppercase" th:field="*{code}"
                               th:classappend="${#fields.hasErrors('code')} ? 'is-invalid'" placeholder="e.g. FF-001"/>
                        <div class="invalid-feedback" th:errors="*{code}"></div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Category *</label>
                        <select class="form-select" th:field="*{category}"
                                th:classappend="${#fields.hasErrors('category')} ? 'is-invalid'">
                            <option value="">-- Select --</option>
                            <option th:each="cat : ${categories}" th:value="${cat.name()}" th:text="${cat.label}"></option>
                        </select>
                        <div class="invalid-feedback" th:errors="*{category}"></div>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label fw-semibold">Status</label>
                        <select class="form-select" th:field="*{status}">
                            <option th:each="s : ${statuses}" th:value="${s.name()}" th:text="${s.label}"></option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label fw-semibold">Rating (1–5)</label>
                        <select class="form-select" th:field="*{rating}">
                            <option th:each="i : ${#numbers.sequence(1,5)}" th:value="${i}" th:text="${i + ' ★'}"></option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Email</label>
                        <input type="email" class="form-control" th:field="*{email}"
                               th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"/>
                        <div class="invalid-feedback" th:errors="*{email}"></div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Phone</label>
                        <input type="text" class="form-control" th:field="*{phone}"/>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Website</label>
                        <input type="text" class="form-control" th:field="*{website}"/>
                    </div>
                    <div class="col-12">
                        <label class="form-label fw-semibold">Address</label>
                        <input type="text" class="form-control" th:field="*{address}"/>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">City</label>
                        <input type="text" class="form-control" th:field="*{city}"/>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Country</label>
                        <input type="text" class="form-control" th:field="*{country}"/>
                    </div>
                    <div class="col-12">
                        <label class="form-label fw-semibold">Notes</label>
                        <textarea class="form-control" th:field="*{notes}" rows="3"></textarea>
                    </div>
                </div>
                <hr class="my-4"/>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary"><i class="bi bi-save me-1"></i>Save Supplier</button>
                    <a th:href="@{/vendor}" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
