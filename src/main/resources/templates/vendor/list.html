<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout/main}">
<head><title>Suppliers</title></head>
<body>
<div layout:fragment="content">
    <div class="page-header d-flex justify-content-between align-items-center mb-4">
        <div class="d-flex align-items-center gap-2">
            <i class="bi bi-truck fs-4"></i>
            <h2 class="mb-0">Suppliers</h2>
        </div>
        <a th:href="@{/vendor/new}" class="btn btn-primary"
           sec:authorize="hasAnyRole('ADMIN','DATA_MANAGER','DATA_STEWARD')">
            <i class="bi bi-plus-lg me-1"></i>New Supplier
        </a>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <div th:if="${#lists.isEmpty(suppliers)}" class="text-center text-muted py-5">
                <i class="bi bi-truck fs-1 d-block mb-3"></i>No suppliers found.
            </div>
            <table class="table table-hover align-middle mb-0" th:unless="${#lists.isEmpty(suppliers)}">
                <thead class="table-light">
                    <tr>
                        <th>Supplier</th><th>Code</th><th>Category</th><th>Location</th>
                        <th>Rating</th><th>Status</th><th>Workflow</th><th class="text-end">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="s : ${suppliers}">
                        <td>
                            <div class="fw-semibold" th:text="${s.name}"></div>
                            <div class="text-muted small" th:text="${s.email ?: ''}"></div>
                        </td>
                        <td><code th:text="${s.code}"></code></td>
                        <td><span class="badge bg-light text-dark border" th:text="${s.category.label}"></span></td>
                        <td th:text="${(s.city ?: '') + (s.country != null ? ', ' + s.country : '')}"></td>
                        <td>
                            <span th:each="i : ${#numbers.sequence(1, s.rating)}" class="text-warning small">&#9733;</span>
                            <span th:each="i : ${#numbers.sequence(s.rating + 1, 5)}" class="text-muted small">&#9733;</span>
                        </td>
                        <td>
                            <span class="badge"
                                  th:classappend="${s.status.name() == 'ACTIVE'} ? 'bg-success' :
                                                 (${s.status.name() == 'BLACKLISTED'} ? 'bg-danger' : 'bg-secondary')"
                                  th:text="${s.status.label}"></span>
                        </td>
                        <td th:insert="~{fragments/workflow-badge :: badge(${s.workflowStatus})}"></td>
                        <td class="text-end">
                            <a th:href="@{/vendor/{id}(id=${s.id})}" class="btn btn-sm btn-outline-secondary">
                                <i class="bi bi-eye"></i>
                            </a>
                            <a th:href="@{/vendor/{id}/edit(id=${s.id})}" class="btn btn-sm btn-outline-primary"
                               sec:authorize="hasAnyRole('ADMIN','DATA_MANAGER','DATA_STEWARD')"
                               th:if="${s.editable}">
                                <i class="bi bi-pencil"></i>
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
