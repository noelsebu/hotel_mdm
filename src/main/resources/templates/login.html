<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login - HotelMDM</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body class="login-page">
<div class="login-container">
    <div class="login-card">
        <div class="login-header">
            <i class="bi bi-building-fill-gear login-icon"></i>
            <h1 class="login-title">HotelMDM</h1>
            <p class="login-subtitle">Master Data Management</p>
        </div>

        <div th:if="${param.error}" class="alert alert-danger py-2">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>Invalid username or password.
        </div>
        <div th:if="${param.logout}" class="alert alert-info py-2">
            <i class="bi bi-check-circle-fill me-2"></i>You have been logged out.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label for="username" class="form-label fw-semibold">Username</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" class="form-control" id="username" name="username"
                           placeholder="Enter username" required autofocus/>
                </div>
            </div>
            <div class="mb-4">
                <label for="password" class="form-label fw-semibold">Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" class="form-control" id="password" name="password"
                           placeholder="Enter password" required/>
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100 btn-login">
                <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
            </button>
        </form>

        <hr class="my-4"/>
        <div class="login-demo-accounts">
            <p class="text-muted small fw-semibold mb-2">Demo Accounts</p>
            <div class="row g-1 text-center">
                <div class="col-6"><span class="badge bg-danger">admin</span> / admin123</div>
                <div class="col-6"><span class="badge bg-warning text-dark">manager</span> / manager123</div>
                <div class="col-6"><span class="badge bg-info text-dark">steward</span> / steward123</div>
                <div class="col-6"><span class="badge bg-secondary">viewer</span> / viewer123</div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
