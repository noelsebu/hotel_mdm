<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head><title>New User</title></head>
<body>
<div layout:fragment="content">
    <div class="page-header d-flex align-items-center mb-4">
        <a th:href="@{/admin/users}" class="btn btn-sm btn-outline-secondary me-3"><i class="bi bi-arrow-left"></i></a>
        <i class="bi bi-person-plus me-2 fs-4"></i>
        <h2 class="mb-0">New User</h2>
    </div>
    <div class="card border-0 shadow-sm" style="max-width:550px;">
        <div class="card-body">
            <form th:action="@{/admin/users}" th:object="${user}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Username *</label>
                    <input type="text" class="form-control" th:field="*{username}"
                           th:classappend="${#fields.hasErrors('username')} ? 'is-invalid'"/>
                    <div class="invalid-feedback" th:errors="*{username}"></div>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Full Name *</label>
                    <input type="text" class="form-control" th:field="*{fullName}"
                           th:classappend="${#fields.hasErrors('fullName')} ? 'is-invalid'"/>
                    <div class="invalid-feedback" th:errors="*{fullName}"></div>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Email</label>
                    <input type="email" class="form-control" th:field="*{email}"/>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Password *</label>
                    <input type="password" class="form-control" name="rawPassword" required minlength="6"/>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Role *</label>
                    <select class="form-select" th:field="*{role}">
                        <option value="">-- Select Role --</option>
                        <option th:each="r : ${roles}" th:value="${r.name()}" th:text="${r.label}"></option>
                    </select>
                </div>
                <hr class="my-3"/>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary"><i class="bi bi-save me-1"></i>Create User</button>
                    <a th:href="@{/admin/users}" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
