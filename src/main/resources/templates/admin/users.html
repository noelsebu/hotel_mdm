<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head><title>User Management</title></head>
<body>
<div layout:fragment="content">
    <div class="page-header d-flex justify-content-between align-items-center mb-4">
        <div class="d-flex align-items-center gap-2">
            <i class="bi bi-people-fill fs-4"></i>
            <h2 class="mb-0">User Management</h2>
        </div>
        <a th:href="@{/admin/users/new}" class="btn btn-primary">
            <i class="bi bi-person-plus me-1"></i>New User
        </a>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                    <tr><th>Username</th><th>Full Name</th><th>Email</th><th>Role</th><th>Status</th><th>Created</th><th class="text-end">Actions</th></tr>
                </thead>
                <tbody>
                    <tr th:each="user : ${users}">
                        <td><strong th:text="${user.username}"></strong></td>
                        <td th:text="${user.fullName}"></td>
                        <td th:text="${user.email ?: '—'}"></td>
                        <td>
                            <span class="badge"
                                  th:classappend="${user.role.name() == 'ADMIN'} ? 'bg-danger' :
                                                 (${user.role.name() == 'DATA_MANAGER'} ? 'bg-warning text-dark' :
                                                 (${user.role.name() == 'DATA_STEWARD'} ? 'bg-info text-dark' : 'bg-secondary'))"
                                  th:text="${user.role.label}"></span>
                        </td>
                        <td>
                            <span th:if="${user.enabled}" class="badge bg-success">Active</span>
                            <span th:unless="${user.enabled}" class="badge bg-secondary">Disabled</span>
                        </td>
                        <td class="text-muted small"
                            th:text="${user.createdAt != null} ? ${#temporals.format(user.createdAt,'dd MMM yyyy')} : '—'"></td>
                        <td class="text-end">
                            <form th:action="@{/admin/users/{id}/toggle(id=${user.id})}" method="post" class="d-inline">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button class="btn btn-sm"
                                        th:classappend="${user.enabled} ? 'btn-outline-warning' : 'btn-outline-success'"
                                        th:text="${user.enabled} ? 'Disable' : 'Enable'"></button>
                            </form>
                            <form th:action="@{/admin/users/{id}/delete(id=${user.id})}" method="post" class="d-inline"
                                  onsubmit="return confirm('Delete user ' + /*[[${user.username}]]*/ '' + '?')">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
