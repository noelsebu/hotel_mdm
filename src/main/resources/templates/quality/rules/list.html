<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout/main}">
<head><title>Data Quality Rules</title></head>
<body>
<div layout:fragment="content">
    <div class="page-header d-flex justify-content-between align-items-center mb-4">
        <div class="d-flex align-items-center gap-2">
            <i class="bi bi-shield-check fs-4"></i>
            <h2 class="mb-0">Data Quality Rules</h2>
        </div>
        <a th:href="@{/quality/rules/new}" class="btn btn-primary"
           sec:authorize="hasAnyRole('ADMIN','DATA_MANAGER')">
            <i class="bi bi-plus-lg me-1"></i>New Rule
        </a>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <div th:if="${#lists.isEmpty(rules)}" class="text-center text-muted py-5">
                <i class="bi bi-shield fs-1 d-block mb-3"></i>No rules defined yet.
            </div>
            <table class="table table-hover align-middle mb-0" th:unless="${#lists.isEmpty(rules)}">
                <thead class="table-light">
                    <tr><th>Name</th><th>Entity</th><th>Field</th><th>Rule Type</th><th>Constraint</th><th>Severity</th><th>Active</th><th class="text-end" sec:authorize="hasAnyRole('ADMIN','DATA_MANAGER')">Actions</th></tr>
                </thead>
                <tbody>
                    <tr th:each="rule : ${rules}" th:classappend="${!rule.active} ? 'text-muted' : ''">
                        <td>
                            <div class="fw-semibold" th:text="${rule.name}"></div>
                            <div class="text-muted small" th:text="${rule.message}"></div>
                        </td>
                        <td><span class="badge bg-light text-dark border" th:text="${rule.entityType}"></span></td>
                        <td><code th:text="${rule.fieldName}"></code></td>
                        <td th:text="${rule.ruleType.label}"></td>
                        <td class="text-muted small" th:text="${rule.ruleValue ?: '—'}"></td>
                        <td>
                            <span class="badge"
                                  th:classappend="${rule.severity.name() == 'ERROR'} ? 'bg-danger' :
                                                 (${rule.severity.name() == 'WARNING'} ? 'bg-warning text-dark' : 'bg-info text-dark')"
                                  th:text="${rule.severity.label}"></span>
                        </td>
                        <td>
                            <form th:action="@{/quality/rules/{id}/toggle(id=${rule.id})}" method="post"
                                  sec:authorize="hasAnyRole('ADMIN','DATA_MANAGER')">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <div class="form-check form-switch mb-0">
                                    <input class="form-check-input" type="checkbox" th:checked="${rule.active}"
                                           onchange="this.form.submit()" role="switch"/>
                                </div>
                            </form>
                        </td>
                        <td class="text-end" sec:authorize="hasAnyRole('ADMIN','DATA_MANAGER')">
                            <a th:href="@{/quality/rules/{id}/edit(id=${rule.id})}" class="btn btn-sm btn-outline-primary">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <form th:action="@{/quality/rules/{id}/delete(id=${rule.id})}" method="post" class="d-inline"
                                  sec:authorize="hasRole('ADMIN')" onsubmit="return confirm('Delete this rule?')">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
