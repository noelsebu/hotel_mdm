<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head><title>Room Form</title></head>
<body>
<div layout:fragment="content">
    <div class="page-header d-flex align-items-center mb-4">
        <a th:href="@{/property/rooms}" class="btn btn-sm btn-outline-secondary me-3"><i class="bi bi-arrow-left"></i></a>
        <i class="bi bi-door-open me-2 fs-4"></i>
        <h2 class="mb-0" th:text="${room.id != null} ? 'Edit Room' : 'New Room'">Room Form</h2>
    </div>

    <div class="card border-0 shadow-sm" style="max-width:700px;">
        <div class="card-body">
            <form th:action="${room.id != null} ? @{/property/rooms/{id}(id=${room.id})} : @{/property/rooms}"
                  th:object="${room}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Hotel *</label>
                    <select name="hotelId" class="form-select" required>
                        <option value="">-- Select Hotel --</option>
                        <option th:each="h : ${hotels}" th:value="${h.id}" th:text="${h.name}"
                                th:selected="${preselectedHotelId != null and preselectedHotelId == h.id}"></option>
                    </select>
                </div>
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Room Number *</label>
                        <input type="text" class="form-control" th:field="*{roomNumber}"
                               th:classappend="${#fields.hasErrors('roomNumber')} ? 'is-invalid'"/>
                        <div class="invalid-feedback" th:errors="*{roomNumber}"></div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Room Type *</label>
                        <select class="form-select" th:field="*{roomType}"
                                th:classappend="${#fields.hasErrors('roomType')} ? 'is-invalid'">
                            <option value="">-- Select --</option>
                            <option th:each="type : ${roomTypes}" th:value="${type.name()}" th:text="${type.label}"></option>
                        </select>
                        <div class="invalid-feedback" th:errors="*{roomType}"></div>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-semibold">Floor</label>
                        <input type="number" class="form-control" th:field="*{floor}" min="0" max="100"/>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-semibold">Price / Night (USD) *</label>
                        <input type="number" class="form-control" th:field="*{pricePerNight}"
                               th:classappend="${#fields.hasErrors('pricePerNight')} ? 'is-invalid'"
                               min="0" step="0.01"/>
                        <div class="invalid-feedback" th:errors="*{pricePerNight}"></div>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-semibold">Max Occupancy</label>
                        <input type="number" class="form-control" th:field="*{maxOccupancy}" min="1" max="20"/>
                    </div>
                    <div class="col-12">
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" th:field="*{available}" role="switch"/>
                            <label class="form-check-label fw-semibold">Room Available</label>
                        </div>
                    </div>
                    <div class="col-12">
                        <label class="form-label fw-semibold">Notes</label>
                        <textarea class="form-control" th:field="*{notes}" rows="2"></textarea>
                    </div>
                </div>
                <hr class="my-4"/>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary"><i class="bi bi-save me-1"></i>Save Room</button>
                    <a th:href="@{/property/rooms}" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
