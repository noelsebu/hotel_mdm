<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout/main}">
<head><title>Rooms</title></head>
<body>
<div layout:fragment="content">
    <div class="page-header d-flex justify-content-between align-items-center mb-4">
        <div class="d-flex align-items-center gap-2">
            <i class="bi bi-door-open fs-4"></i>
            <h2 class="mb-0">Rooms</h2>
        </div>
        <div class="d-flex gap-2">
            <form class="d-flex gap-2" method="get">
                <select name="hotelId" class="form-select form-select-sm" onchange="this.form.submit()">
                    <option value="">All Hotels</option>
                    <option th:each="h : ${hotels}" th:value="${h.id}" th:text="${h.name}"
                            th:selected="${selectedHotel != null and selectedHotel.id == h.id}"></option>
                </select>
            </form>
            <a th:href="@{/property/rooms/new}" class="btn btn-primary btn-sm"
               sec:authorize="hasAnyRole('ADMIN','DATA_MANAGER','DATA_STEWARD')">
                <i class="bi bi-plus-lg me-1"></i>New Room
            </a>
        </div>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <div th:if="${#lists.isEmpty(rooms)}" class="text-center text-muted py-5">
                <i class="bi bi-door-open fs-1 d-block mb-3"></i>No rooms found.
            </div>
            <table class="table table-hover align-middle mb-0" th:unless="${#lists.isEmpty(rooms)}">
                <thead class="table-light">
                    <tr>
                        <th>Room #</th><th>Hotel</th><th>Type</th><th>Floor</th>
                        <th>Price/Night</th><th>Max Occ.</th><th>Available</th><th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="room : ${rooms}">
                        <td><strong th:text="${room.roomNumber}"></strong></td>
                        <td>
                            <a th:href="@{/property/hotels/{id}(id=${room.hotel.id})}"
                               th:text="${room.hotel.name}" class="text-decoration-none"></a>
                        </td>
                        <td><span class="badge bg-light text-dark border" th:text="${room.roomType.label}"></span></td>
                        <td th:text="${room.floor}"></td>
                        <td th:text="${'$' + room.pricePerNight}"></td>
                        <td th:text="${room.maxOccupancy}"></td>
                        <td>
                            <span th:if="${room.available}" class="badge bg-success">Available</span>
                            <span th:unless="${room.available}" class="badge bg-secondary">Occupied</span>
                        </td>
                        <td>
                            <a th:href="@{/property/rooms/{id}/edit(id=${room.id})}"
                               class="btn btn-sm btn-outline-primary"
                               sec:authorize="hasAnyRole('ADMIN','DATA_MANAGER','DATA_STEWARD')">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <form th:action="@{/property/rooms/{id}/delete(id=${room.id})}" method="post" class="d-inline"
                                  sec:authorize="hasAnyRole('ADMIN','DATA_MANAGER')"
                                  onsubmit="return confirm('Delete room?')">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
