<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout/main}">
<head><title>Hotels</title></head>
<body>
<div layout:fragment="content">
    <div class="page-header d-flex justify-content-between align-items-center mb-4">
        <div class="d-flex align-items-center">
            <i class="bi bi-building me-2 fs-4"></i>
            <h2 class="mb-0">Hotels</h2>
        </div>
        <a th:href="@{/property/hotels/new}" class="btn btn-primary"
           sec:authorize="hasAnyRole('ADMIN','DATA_MANAGER','DATA_STEWARD')">
            <i class="bi bi-plus-lg me-1"></i>New Hotel
        </a>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <div th:if="${#lists.isEmpty(hotels)}" class="text-center text-muted py-5">
                <i class="bi bi-building fs-1 d-block mb-3"></i>
                No hotels found. <a th:href="@{/property/hotels/new}" sec:authorize="hasAnyRole('ADMIN','DATA_MANAGER','DATA_STEWARD')">Add the first one.</a>
            </div>
            <div class="table-responsive" th:unless="${#lists.isEmpty(hotels)}">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>Hotel</th>
                            <th>Brand</th>
                            <th>Location</th>
                            <th>Stars</th>
                            <th>Rooms</th>
                            <th>Status</th>
                            <th class="text-end">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="hotel : ${hotels}">
                            <td>
                                <div class="fw-semibold" th:text="${hotel.name}"></div>
                                <div class="text-muted small"><code th:text="${hotel.code}"></code></div>
                            </td>
                            <td>
                                <span th:if="${hotel.brand != null}">
                                    <span class="brand-dot me-1"
                                          th:style="${hotel.brand.colorCode != null} ? 'background-color:' + ${hotel.brand.colorCode} + ';width:10px;height:10px;border-radius:50%;display:inline-block;' : ''"></span>
                                    <a th:href="@{/brand/{id}(id=${hotel.brand.id})}"
                                       th:text="${hotel.brand.name}" class="text-decoration-none small"></a>
                                </span>
                                <span th:unless="${hotel.brand != null}" class="text-muted small">—</span>
                            </td>
                            <td th:text="${hotel.city + ', ' + hotel.country}"></td>
                            <td>
                                <span th:each="i : ${#numbers.sequence(1, hotel.starRating)}" class="text-warning">&#9733;</span>
                                <span th:each="i : ${#numbers.sequence(hotel.starRating + 1, 5)}" class="text-muted">&#9733;</span>
                            </td>
                            <td th:text="${hotel.totalRooms}"></td>
                            <td th:insert="~{fragments/workflow-badge :: badge(${hotel.workflowStatus})}"></td>
                            <td class="text-end">
                                <a th:href="@{/property/hotels/{id}(id=${hotel.id})}" class="btn btn-sm btn-outline-secondary">
                                    <i class="bi bi-eye"></i>
                                </a>
                                <a th:href="@{/property/hotels/{id}/edit(id=${hotel.id})}" class="btn btn-sm btn-outline-primary"
                                   sec:authorize="hasAnyRole('ADMIN','DATA_MANAGER','DATA_STEWARD')"
                                   th:if="${hotel.workflowStatus.name() == 'DRAFT' || hotel.workflowStatus.name() == 'REJECTED'}">
                                    <i class="bi bi-pencil"></i>
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
