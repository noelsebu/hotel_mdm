<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head><title>Amenity Form</title></head>
<body>
<div layout:fragment="content">
    <div class="page-header d-flex align-items-center mb-4">
        <a th:href="@{/property/amenities}" class="btn btn-sm btn-outline-secondary me-3"><i class="bi bi-arrow-left"></i></a>
        <i class="bi bi-stars me-2 fs-4"></i>
        <h2 class="mb-0" th:text="${amenity.id != null} ? 'Edit Amenity' : 'New Amenity'"></h2>
    </div>
    <div class="card border-0 shadow-sm" style="max-width:600px;">
        <div class="card-body">
            <form th:action="${amenity.id != null} ? @{/property/amenities/{id}(id=${amenity.id})} : @{/property/amenities}"
                  th:object="${amenity}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Name *</label>
                    <input type="text" class="form-control" th:field="*{name}"
                           th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'"/>
                    <div class="invalid-feedback" th:errors="*{name}"></div>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Category *</label>
                    <select class="form-select" th:field="*{category}"
                            th:classappend="${#fields.hasErrors('category')} ? 'is-invalid'">
                        <option value="">-- Select Category --</option>
                        <option th:each="cat : ${categories}" th:value="${cat.name()}" th:text="${cat.label}"></option>
                    </select>
                    <div class="invalid-feedback" th:errors="*{category}"></div>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Description</label>
                    <textarea class="form-control" th:field="*{description}" rows="3"></textarea>
                </div>
                <hr class="my-3"/>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary"><i class="bi bi-save me-1"></i>Save</button>
                    <a th:href="@{/property/amenities}" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
