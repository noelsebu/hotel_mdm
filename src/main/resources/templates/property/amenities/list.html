<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout/main}">
<head><title>Amenities</title></head>
<body>
<div layout:fragment="content">
    <div class="page-header d-flex justify-content-between align-items-center mb-4">
        <div class="d-flex align-items-center gap-2">
            <i class="bi bi-stars fs-4"></i>
            <h2 class="mb-0">Amenities</h2>
        </div>
        <a th:href="@{/property/amenities/new}" class="btn btn-primary"
           sec:authorize="hasAnyRole('ADMIN','DATA_MANAGER','DATA_STEWARD')">
            <i class="bi bi-plus-lg me-1"></i>New Amenity
        </a>
    </div>

    <div class="row g-3">
        <div class="col-md-4" th:each="amenity : ${amenities}">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-start">
                        <div>
                            <h6 class="fw-semibold mb-1" th:text="${amenity.name}"></h6>
                            <span class="badge bg-light text-dark border" th:text="${amenity.category.label}"></span>
                        </div>
                        <div class="d-flex gap-1" sec:authorize="hasAnyRole('ADMIN','DATA_MANAGER','DATA_STEWARD')">
                            <a th:href="@{/property/amenities/{id}/edit(id=${amenity.id})}"
                               class="btn btn-xs btn-outline-primary"><i class="bi bi-pencil"></i></a>
                            <form th:action="@{/property/amenities/{id}/delete(id=${amenity.id})}" method="post"
                                  sec:authorize="hasAnyRole('ADMIN','DATA_MANAGER')"
                                  onsubmit="return confirm('Delete amenity?')">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button class="btn btn-xs btn-outline-danger"><i class="bi bi-trash"></i></button>
                            </form>
                        </div>
                    </div>
                    <p class="text-muted small mt-2 mb-0" th:text="${amenity.description ?: 'No description.'}"></p>
                    <div class="mt-2 text-muted small">
                        <i class="bi bi-building me-1"></i>
                        Used in <strong th:text="${#sets.size(amenity.hotels)}"></strong> hotel(s)
                    </div>
                </div>
            </div>
        </div>
        <div class="col-12 text-center text-muted py-5" th:if="${#lists.isEmpty(amenities)}">
            <i class="bi bi-stars fs-1 d-block mb-3"></i>No amenities yet.
        </div>
    </div>
</div>
</body>
</html>
