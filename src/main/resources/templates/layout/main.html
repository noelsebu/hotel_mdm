<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title layout:title-pattern="$CONTENT_TITLE - HotelMDM">HotelMDM</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<!-- Top Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark mdm-navbar fixed-top">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" th:href="@{/dashboard}">
            <i class="bi bi-building-fill-gear me-2"></i>HotelMDM
        </a>
        <div class="ms-auto d-flex align-items-center gap-3">
            <span class="text-white-50 small">
                <i class="bi bi-person-circle me-1"></i>
                <span sec:authentication="name">User</span>
                <span class="badge ms-1 role-badge" sec:authentication="authorities">role</span>
            </span>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-outline-light btn-sm">
                    <i class="bi bi-box-arrow-right me-1"></i>Logout
                </button>
            </form>
        </div>
    </div>
</nav>

<div class="d-flex" style="padding-top:56px;">

    <!-- Sidebar -->
    <nav class="mdm-sidebar d-flex flex-column" id="sidebar">
        <div class="sidebar-section-label">NAVIGATION</div>

        <a th:href="@{/dashboard}" class="sidebar-link" th:classappend="${requestUri != null and requestUri.contains('/dashboard')} ? 'active' : ''">
            <i class="bi bi-speedometer2"></i> Dashboard
        </a>

        <div class="sidebar-section-label mt-2">CHAIN HIERARCHY</div>
        <a th:href="@{/chain}" class="sidebar-link" th:classappend="${requestUri != null and (requestUri.startsWith('/chain') or requestUri.startsWith('/brand'))} ? 'active' : ''">
            <i class="bi bi-diagram-3"></i> Chains &amp; Brands
        </a>

        <div class="sidebar-section-label mt-2">PROPERTY</div>
        <a th:href="@{/property/hotels}" class="sidebar-link" th:classappend="${requestUri != null and requestUri.contains('/property/hotels')} ? 'active' : ''">
            <i class="bi bi-building"></i> Hotels
        </a>
        <a th:href="@{/property/rooms}" class="sidebar-link" th:classappend="${requestUri != null and requestUri.contains('/property/rooms')} ? 'active' : ''">
            <i class="bi bi-door-open"></i> Rooms
        </a>
        <a th:href="@{/property/amenities}" class="sidebar-link" th:classappend="${requestUri != null and requestUri.contains('/property/amenities')} ? 'active' : ''">
            <i class="bi bi-stars"></i> Amenities
        </a>

        <div class="sidebar-section-label mt-2">GUEST</div>
        <a th:href="@{/guest}" class="sidebar-link" th:classappend="${requestUri != null and requestUri.startsWith('/guest')} ? 'active' : ''">
            <i class="bi bi-people"></i> Guests
        </a>

        <div class="sidebar-section-label mt-2">VENDOR</div>
        <a th:href="@{/vendor}" class="sidebar-link" th:classappend="${requestUri != null and requestUri.startsWith('/vendor')} ? 'active' : ''">
            <i class="bi bi-truck"></i> Suppliers
        </a>

        <div class="sidebar-section-label mt-2">GOVERNANCE</div>
        <a th:href="@{/governance/approvals}" class="sidebar-link" th:classappend="${requestUri != null and requestUri.contains('/governance/approvals')} ? 'active' : ''">
            <i class="bi bi-check2-circle"></i> Approvals
        </a>
        <a th:href="@{/governance/tasks}" class="sidebar-link" th:classappend="${requestUri != null and requestUri.contains('/governance/tasks')} ? 'active' : ''">
            <i class="bi bi-clipboard-check"></i> Steward Tasks
        </a>

        <div class="sidebar-section-label mt-2">DATA MANAGEMENT</div>
        <a th:href="@{/quality/rules}" class="sidebar-link" th:classappend="${requestUri != null and requestUri.contains('/quality')} ? 'active' : ''">
            <i class="bi bi-shield-check"></i> Quality Rules
        </a>
        <a th:href="@{/audit}" class="sidebar-link" th:classappend="${requestUri != null and requestUri.contains('/audit')} ? 'active' : ''">
            <i class="bi bi-journal-text"></i> Audit Trail
        </a>

        <div class="sidebar-section-label mt-2" sec:authorize="hasRole('ADMIN')">ADMIN</div>
        <a th:href="@{/admin/users}" class="sidebar-link" sec:authorize="hasRole('ADMIN')"
           th:classappend="${requestUri != null and requestUri.contains('/admin')} ? 'active' : ''">
            <i class="bi bi-gear"></i> User Management
        </a>
        <a th:href="@{/h2-console}" class="sidebar-link" sec:authorize="hasRole('ADMIN')" target="_blank">
            <i class="bi bi-database"></i> H2 Console
        </a>
    </nav>

    <!-- Main Content -->
    <main class="mdm-main flex-grow-1 p-4">
        <!-- Flash Messages -->
        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="bi bi-check-circle-fill me-2"></i>
            <span th:text="${successMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>
            <span th:text="${errorMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div layout:fragment="content">
            <!-- Page content injected here -->
        </div>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
