<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout/main}">
<head><title th:text="${chain.name}">Chain Detail</title></head>
<body>
<div layout:fragment="content">

    <!-- Header -->
    <div class="page-header d-flex justify-content-between align-items-center mb-4">
        <div class="d-flex align-items-center gap-3">
            <a th:href="@{/chain}" class="btn btn-sm btn-outline-secondary">
                <i class="bi bi-arrow-left"></i>
            </a>
            <div>
                <div class="d-flex align-items-center gap-2">
                    <i class="bi bi-diagram-3 fs-4"></i>
                    <h2 class="mb-0" th:text="${chain.name}"></h2>
                    <div th:insert="~{fragments/workflow-badge :: badge(${chain.workflowStatus})}"></div>
                </div>
                <small class="text-muted ms-5">
                    <code th:text="${chain.code}"></code>
                    <span th:if="${chain.formerName}" th:text="' · formerly ' + ${chain.formerName}"></span>
                </small>
            </div>
        </div>
        <div class="d-flex gap-2" sec:authorize="hasAnyRole('ADMIN','DATA_MANAGER')">
            <a th:if="${chain.isEditable()}" th:href="@{/chain/{id}/edit(id=${chain.id})}"
               class="btn btn-outline-primary btn-sm">
                <i class="bi bi-pencil me-1"></i>Edit
            </a>
            <form th:if="${chain.isDraft()}" th:action="@{/chain/{id}/submit(id=${chain.id})}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button class="btn btn-warning btn-sm">
                    <i class="bi bi-send me-1"></i>Submit for Approval
                </button>
            </form>
            <a th:href="@{/brand/new(chainId=${chain.id})}" class="btn btn-success btn-sm">
                <i class="bi bi-plus-lg me-1"></i>Add Brand
            </a>
        </div>
    </div>

    <div class="row g-4">
        <!-- Chain Info -->
        <div class="col-md-4">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-header bg-white fw-semibold">
                    <i class="bi bi-info-circle me-2"></i>Chain Information
                </div>
                <div class="card-body">
                    <dl class="row mb-0">
                        <dt class="col-5 text-muted small">Founded</dt>
                        <dd class="col-7" th:text="${chain.foundedYear ?: '—'}"></dd>

                        <dt class="col-5 text-muted small">Headquarters</dt>
                        <dd class="col-7" th:text="${chain.headquarters ?: '—'}"></dd>

                        <dt class="col-5 text-muted small">Country</dt>
                        <dd class="col-7" th:text="${chain.country ?: '—'}"></dd>

                        <dt class="col-5 text-muted small">CEO / Founder</dt>
                        <dd class="col-7" th:text="${chain.ceoName ?: '—'}"></dd>

                        <dt class="col-5 text-muted small">Website</dt>
                        <dd class="col-7">
                            <a th:if="${chain.website}" th:href="'https://' + ${chain.website}"
                               th:text="${chain.website}" target="_blank" class="text-truncate d-inline-block" style="max-width:120px;"></a>
                            <span th:unless="${chain.website}" class="text-muted">—</span>
                        </dd>

                        <dt class="col-5 text-muted small">Brands</dt>
                        <dd class="col-7 fw-bold" th:text="${chain.totalBrands}"></dd>
                    </dl>
                    <div th:if="${chain.description}" class="mt-3 pt-3 border-top text-muted small" th:text="${chain.description}"></div>
                </div>
            </div>
        </div>

        <!-- Brands Portfolio -->
        <div class="col-md-8">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white fw-semibold">
                    <i class="bi bi-collection me-2"></i>Brand Portfolio
                    <span class="badge bg-primary ms-2" th:text="${chain.totalBrands}"></span>
                </div>
                <div class="card-body p-0">
                    <div th:if="${#lists.isEmpty(chain.brands)}" class="text-center text-muted py-4">
                        <i class="bi bi-collection fs-3 d-block mb-2"></i>
                        No brands yet.
                        <a th:href="@{/brand/new(chainId=${chain.id})}" sec:authorize="hasAnyRole('ADMIN','DATA_MANAGER')">Add one.</a>
                    </div>
                    <div th:each="brand : ${chain.brands}" class="border-bottom p-3">
                        <div class="d-flex justify-content-between align-items-start">
                            <div class="d-flex gap-3 align-items-start">
                                <div class="brand-color-swatch rounded"
                                     th:style="${brand.colorCode != null} ? 'background-color:' + ${brand.colorCode} + ';width:40px;height:40px;' : 'background-color:#6c757d;width:40px;height:40px;'">
                                </div>
                                <div>
                                    <div class="fw-semibold" th:text="${brand.name}"></div>
                                    <div class="d-flex gap-2 mt-1">
                                        <span class="badge bg-secondary small" th:text="${brand.tier.label}"></span>
                                        <span class="badge bg-light text-dark small" th:text="${brand.segment.label}"></span>
                                        <span th:if="${brand.minStarRating != null}" class="text-muted small"
                                              th:text="${brand.minStarRating} + '–' + ${brand.maxStarRating} + ' ★'"></span>
                                    </div>
                                    <div class="text-muted small mt-1" th:if="${brand.description}"
                                         th:text="${#strings.abbreviate(brand.description, 100)}"></div>
                                </div>
                            </div>
                            <div class="d-flex align-items-center gap-2">
                                <div th:insert="~{fragments/workflow-badge :: badge(${brand.workflowStatus})}"></div>
                                <a th:href="@{/brand/{id}(id=${brand.id})}" class="btn btn-sm btn-outline-secondary">
                                    <i class="bi bi-eye"></i>
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Audit History -->
    <div class="card border-0 shadow-sm mt-4">
        <div class="card-header bg-white fw-semibold">
            <i class="bi bi-journal-text me-2"></i>Audit History
        </div>
        <div class="card-body p-0">
            <div th:if="${#lists.isEmpty(auditHistory)}" class="text-muted p-3 text-center small">No audit entries yet.</div>
            <table class="table table-sm mb-0" th:unless="${#lists.isEmpty(auditHistory)}">
                <tbody>
                    <tr th:each="entry : ${auditHistory}">
                        <td class="text-muted small ps-3" style="width:160px;"
                            th:text="${#temporals.format(entry.performedAt, 'dd MMM yyyy HH:mm')}"></td>
                        <td style="width:100px;">
                            <span class="badge"
                                  th:classappend="${entry.action == 'CREATE'} ? 'bg-success' : (${entry.action == 'DELETE'} ? 'bg-danger' : 'bg-secondary')"
                                  th:text="${entry.action}"></span>
                        </td>
                        <td class="small fw-semibold" th:text="${entry.performedBy}"></td>
                        <td class="small text-muted" th:text="${entry.details}"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
